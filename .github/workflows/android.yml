name: Unpack and build Njira APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Unpack the project zip (first run only)
        run: |
          shopt -s nullglob
          zips=(NjiraApp-upload*.zip)
          if [ ${#zips[@]} -gt 0 ]; then
            unzip -o "${zips[0]}" -d _unpacked
            rsync -a _unpacked/NjiraApp-upload/ ./
            rm -rf _unpacked "${zips[@]}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Unpack Njira project into folders"
            git push
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up the Android SDK
        uses: android-actions/setup-android@v3

      - name: Build the debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: njira-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
